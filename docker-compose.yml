version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nextgen_erp_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - NEXT_PUBLIC_APP_NAME=${NEXT_PUBLIC_APP_NAME}
      - NEXT_PUBLIC_PAN=${NEXT_PUBLIC_PAN}
      - NEXT_PUBLIC_PHONE=${NEXT_PUBLIC_PHONE}
      - NEXT_PUBLIC_ADDRESS=${NEXT_PUBLIC_ADDRESS}
    depends_on:
      - db
    networks:
      - nextgen_network

  db:
    image: postgres:16-alpine
    container_name: nextgen_erp_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-nextgen_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-NextGen@2026}
      - POSTGRES_DB=${POSTGRES_DB:-nextgen_erp}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nextgen_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nextgen_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nextgen_erp_migrate
    command: >
      sh -c "npx prisma db push && npx prisma db seed"
    environment:
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - nextgen_network
    restart: "no"

volumes:
  postgres_data:
    driver: local

networks:
  nextgen_network:
    driver: bridge
