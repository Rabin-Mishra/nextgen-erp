version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: nextgen_erp_db_dev
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=nextgen_user
      - POSTGRES_PASSWORD=NextGen@2026
      - POSTGRES_DB=nextgen_erp
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextgen_user"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_dev_data:
    driver: local
